[gcode_macro LOAD_FILAMENT]
gcode:
      M118 LOAD_FILAMENT WAIT EXTRUDER TEMPERATURE
      M109 S{printer.custom_macro.default_extruder_temp}
      M118 LOAD_FILAMENT START ETRUDER
      CO_PRINT_LOAD_FILAMENT
      G91
      G1 E200 F360
      G90
	  M118 LOAD_FILAMENT END

[gcode_macro PARK_FILAMENT]
gcode:
      M118 PARK_FILAMENT WAIT EXTRUDER TEMPERATURE
      M109 S{printer.custom_macro.default_extruder_temp}
      FILAMENT_CUT
      G91
      G1 E-100 F300
      G90
      M118 PARK_FILAMENT END

[gcode_macro _TOOLHEAD_PARK_PAUSE]
description: Helper: park toolhead used in PAUSE and CANCEL_PRINT
variable_extrude: 1.0
gcode:
  ##### set park positon for x and y #####
  # default is your max posion from your printer.cfg

  {% set x_park = printer.toolhead.axis_maximum.x|float - 10.0 %}
  {% set y_park = printer.toolhead.axis_minimum.y|float + 5.0 %}
  {% set z_park_delta = 10.0 %}
  ##### calculate save lift position #####
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set act_z = printer.toolhead.position.z|float %}
  {% if act_z < (max_z - z_park_delta) %}
    {% set z_safe = z_park_delta %}
  {% else %}
    {% set z_safe = max_z - act_z %}
  {% endif %}
  ##### end of definitions #####
  {% if printer.extruder.can_extrude|lower == 'true' %}
    M83
    G1 E-{extrude} F2100
    {% if printer.gcode_move.absolute_extrude |lower == 'true' %} M82 {% endif %}
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}
  {% if "xyz" in printer.toolhead.homed_axes %}
    G91
    G1 Z{z_safe} F900
    G90
    G1 X{x_park} Y{y_park} F3000
    {% if printer.gcode_move.absolute_coordinates|lower == 'false' %} G91 {% endif %}
  {% else %}
    {action_respond_info("Printer not homed")}
  {% endif %}

[gcode_macro _TOOLHEAD_PARK_CANCEL]
description: Helper: park toolhead used in PAUSE and CANCEL_PRINT
variable_extrude: 1.0
gcode:
  ##### set park positon for x and y #####
  # default is your max posion from your printer.cfg

  {% set x_park = printer.toolhead.axis_maximum.x|float - 10.0 %}
  {% set y_park = printer.toolhead.axis_maximum.y|float / 2.0 %}
  {% set z_park_delta = 10.0 %}
  ##### calculate save lift position #####
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set act_z = printer.toolhead.position.z|float %}
  {% if act_z < (max_z - z_park_delta) %}
    {% set z_safe = z_park_delta %}
  {% else %}
    {% set z_safe = max_z - act_z %}
  {% endif %}
  ##### end of definitions #####
  {% if printer.extruder.can_extrude|lower == 'true' %}
    M83
    G1 E-{extrude} F2100
    {% if printer.gcode_move.absolute_extrude |lower == 'true' %} M82 {% endif %}
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}
  {% if "xyz" in printer.toolhead.homed_axes %}
    G91
    G1 Z{z_safe} F900
    G90
    G1 X{x_park} Y{y_park} F3000
    {% if printer.gcode_move.absolute_coordinates|lower == 'false' %} G91 {% endif %}
  {% else %}
    {action_respond_info("Printer not homed")}
  {% endif %}

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
variable_park: True
gcode:
  ## Move head and retract only if not already in the pause state and park set to true

  {% if printer.pause_resume.is_paused|lower == 'false' and park|lower == 'true'%}
    _TOOLHEAD_PARK_CANCEL
  {% endif %}
  G91
  G1 E-25 F3000
  FILAMENT_CUT
  G1 E-100 F3000
  TURN_OFF_HEATERS
  G90
  CANCEL_PRINT_BASE
;  M84

[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
gcode:
  SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0
  PAUSE_BASE
  _TOOLHEAD_PARK_PAUSE

[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
  ##### read extrude from  _TOOLHEAD_PARK_PAUSE  macro #####
  SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0
  {% set extrude = printer['gcode_macro _TOOLHEAD_PARK_PAUSE'].extrude %}
  {% set tn = printer['gcode_macro CO_PRINT_DRAW_LINE'].tn %}
  #### get VELOCITY parameter if specified ####
  {% if 'VELOCITY' in params|upper %}
    {% set get_params = ('VELOCITY=' + params.VELOCITY)  %}
  {%else %}
    {% set get_params = "" %}
  {% endif %}
  ##### end of definitions #####
  {% if printer['gcode_macro CO_PRINT_DRAW_LINE'].prepare|int == 0 %}
        M118 CO_PRINT_DRAW_LINE reload
        CO_PRINT_SET_NORMAL
        T{tn}
       CO_PRINT_DRAW_LINE EXTRUDER={tn}
  {% else %}
      {% if printer.extruder.can_extrude|lower == 'true' %}
        M83
        G1 E{extrude} F2100
        {% if printer.gcode_move.absolute_extrude |lower == 'true' %} M82 {% endif %}
      {% else %}
        {action_respond_info("Extruder not hot enough")}
      {% endif %}
  {% endif %}
  RESUME_BASE {get_params}
  SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=1

[gcode_macro END_PRINT]
gcode:
    {% set x_stop = params.X|default(printer.toolhead.axis_maximum.x-10)|int %}
    {% set y_stop = params.Y|default(printer.toolhead.axis_maximum.y)|int %}
    {% set z_stop = printer.toolhead.axis_maximum.z|int %}
    {% set z_pos = printer.toolhead.position.z|int %}
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0
    {% if z_pos < (z_stop-6) %}
      G91
      G1 E-2 F1000
      G1 Z5
    {% else %}
      G91
      G1 E-2 F1000
      G1 Z1
    {% endif %}
    G1 E-25
    FILAMENT_CUT
    G1 E-100
    G90
    G1 X{x_stop} Y{y_stop} Z{z_stop} F3000
    M106 S0
    M104 S0
    M140 S0
    BEEP
    M84 # Turn off all the motors

