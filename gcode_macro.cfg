[gcode_macro CO_PRINT_DRAW_LINE]
variable_prepare: 0
variable_tn: 0
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER = params.EXTRUDER|default(0)|int %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
    {% set axismax = printer.toolhead.axis_maximum %}
    {% set axismin_x = printer.toolhead.axis_minimum.x %}
    {% set axismin_y = printer.toolhead.axis_minimum.y %}
    M118 CO_PRINT_DRAW_LINE start
    SET_GCODE_VARIABLE MACRO=CO_PRINT_DRAW_LINE VARIABLE=prepare VALUE=0
    SET_GCODE_VARIABLE MACRO=CO_PRINT_DRAW_LINE VARIABLE=tn VALUE={EXTRUDER}
    {% if printer.virtual_sdcard.co_print_err_code == 0 %}
        M118 co_print_err_code == 0
        CO_PRINT_LOAD_FILAMENT IS_RESUME=0
        # SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=1
        # G4 P3000
        _CO_PRINT_DRAW_LINE
        SET_GCODE_VARIABLE MACRO=CO_PRINT_DRAW_LINE VARIABLE=prepare VALUE=1
        SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=1
    {% else %}
        PAUSE
    {% endif %}

[gcode_macro START_PRINT]
variable_prepare: 0
variable_z_sensorless: 0
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER = params.EXTRUDER|default(0)|int %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
    {% set axismax = printer.toolhead.axis_maximum %}
    {% set axismin_x = printer.toolhead.axis_minimum.x %}
    {% set axismin_y = printer.toolhead.axis_minimum.y %}
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0
    SET_GCODE_VARIABLE MACRO=M106 VARIABLE=user_flag VALUE=0
    WAIT_TEMP_END
    CLEAR_PAUSE
    # SET_TEMPERATURE_FAN_TARGET temperature_fan=soc_fan target=5
    {% set g28_extruder_temp = printer.custom_macro.g28_ext_temp %}
    {% set bed_temp = printer.custom_macro.default_bed_temp %}
    {% set extruder_temp = printer.custom_macro.default_extruder_temp %}

    {% if 'BED_TEMP' in params|upper and (params.BED_TEMP|float) %}
    {% set bed_temp = params.BED_TEMP %}
    {% endif %}

    {% if 'EXTRUDER_TEMP' in params|upper and (params.EXTRUDER_TEMP|float) %}
    {% set extruder_temp = params.EXTRUDER_TEMP %}
    {% endif %}

    {% if printer['gcode_macro START_PRINT'].prepare|int == 0 %}
    {action_respond_info("not prepare.\n")}

    PRINT_PREPARE_CLEAR
    CX_ROUGH_G28 EXTRUDER_TEMP={extruder_temp} BED_TEMP={bed_temp}
    CX_NOZZLE_CLEAR
    Z_SENSORLESS_SET
    ACCURATE_G28
    {% else %}
    PRINT_PREPARE_CLEAR
    {% endif %}
    G90
    # Heat bed for probing
    M190 S{BED_TEMP}
    G1 Z10 F450
    M109 S{EXTRUDER_TEMP}
    CHECK_FILAMENT
    T{EXTRUDER}
    G4 P300
    CO_PRINT_DRAW_LINE BED_TEMP={BED_TEMP} EXTRUDER={EXTRUDER} EXTRUDER_TEMP={EXTRUDER_TEMP} axismax={axismax} axismin_x={axismin_x} axismin_y={axismin_y}



[gcode_macro PRINT_PREPARED]
gcode:
  SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=prepare VALUE=1
  {action_respond_info("print prepared")}

[gcode_macro PRINT_PREPARE_CLEAR]
gcode:
  SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=prepare VALUE=0

