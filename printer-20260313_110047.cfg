# F001
# Printer_size: 220x220x250
# Version: v1.9.3
# CreateDate: 2025/02/11
# Nozzle_mcu: chip: GD32F303CBT6
#             version: CR-K1-MAX-NOZZLE-V1.0.0
# Leveling_mcu: chip: GD32E230F8P6
#             version: CR-K1-MAX-LEVELING-V1.0.0
# mcu: chip: GD32F303RET6
#      version: CR4CU220812S12

[include sensorless.cfg]
[include gcode_macro.cfg]
[include printer_params.cfg]
[include Helper-Script/git-backup.cfg]
[include Helper-Script/improved-shapers/improved-shapers.cfg]
[include Helper-Script/save-zoffset.cfg]
[include Helper-Script/useful-macros.cfg]
[include Helper-Script/buzzer-support.cfg]
[include chroma_head.cfg]
[include kcm.cfg]
[include bed_mesh.cfg]
# [include ecm_1.cfg]

# [filament_switch_sensor filament_sensor]
# pause_on_runout: true
# switch_pin:PC10
[filament_switch_sensor filament_sensor]
pause_on_runout: true
switch_pin: !cp_Head:PC10

[mcu]
serial: /dev/ttyS7
baud: 230400
restart_method: command

[mcu leveling_mcu]
serial: /dev/ttyS9
baud: 230400
restart_method: command

[gap_auto_comp]
#show_msg: True
x_gaps: 0
y_gaps: 0
z_gaps: 0

[delayed_gcode set_tn]
initial_duration: 2.
gcode:
  FIRST_SET_TN
  SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0


[prtouch_v2]
pr_version: 1
z_offset: 0
step_base:2
pres_cnt: 4
#show_msg: True
noz_ex_com: 0.04
#noz_ex_com: 0.1
tilt_corr_dis: 0.00
pres0_clk_pins: leveling_mcu:PB13
pres0_sdo_pins: leveling_mcu:PB12
pres1_clk_pins: leveling_mcu:PB15
pres1_sdo_pins: leveling_mcu:PB14
pres2_clk_pins: leveling_mcu:PA9
pres2_sdo_pins: leveling_mcu:PA8
pres3_clk_pins: leveling_mcu:PA11
pres3_sdo_pins: leveling_mcu:PA10
step_swap_pin: mcu:PC10
pres_swap_pin: leveling_mcu:PA12
g28_wait_cool_down: true
speeds: 2.5,1.0
best_above_z: 2
pa_clr_down_mm: -0.15
rdy_xy_spd:300
clr_noz_start_x: 80
clr_noz_start_y: 217
clr_noz_len_x: 70
clr_noz_len_y: 5
tri_min_hold: 3000,20000
tri_max_hold: 6000,60000
tri_hftr_cut: 2,1
need_self_check:false

# correct_tri_hold: 6000
# correct_step_mm: 0.02
z_high_default: -256.0
min_z_pos: -245
retract_z_dist: 245
# retract_z_speed: 3600

[verify_heater heater_bed]
check_gain_time:120
heating_gain: 1.0
hysteresis: 10

[mcu rpi]
serial: /tmp/klipper_host_mcu

[bl24c16f]
i2c_mcu: rpi
i2c_bus: i2c.2
i2c_speed: 400000

[idle_timeout]
timeout: 99999999

[virtual_sdcard]
path: /usr/data/printer_data/gcodes

[gcode_arcs]
resolution: 1.0

[temperature_fan soc_fan]
pin: PB2
cycle_time: 0.0100
hardware_pwm: false
max_power: 1
shutdown_speed: 0
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100
control: watermark
max_delta: 2
target_temp: 45.0
max_speed: 1.0
min_speed: 0.0

[stepper_x]
step_pin:PC2
dir_pin:PB9
enable_pin:!PC3
microsteps:32
rotation_distance:40
endstop_pin:PA5
position_endstop:-2
position_min:-2
position_max:222
homing_speed:60
homing_retract_dist:0 #10

[tmc2209 stepper_x]
uart_pin:PA9
driver_SGTHRS: 90
uart_address:3
interpolate: true
run_current:1.5
sense_resistor: 0.10
stealthchop_threshold: 0
diag_pin: ^PB12
driver_TBL: 0
driver_TOFF: 1
driver_HEND: 12
driver_HSTRT: 7

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 32
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: -5
position_min: -9
position_max: 222.5
homing_speed: 30
homing_retract_dist:0

[tmc2209 stepper_y]
uart_pin:PA10
driver_SGTHRS: 78
uart_address:3
interpolate: true
run_current:1.5
sense_resistor: 0.10
stealthchop_threshold: 0
diag_pin: ^PB13
driver_TBL: 1
driver_TOFF: 2
driver_HEND: 2
driver_HSTRT: 4

[stepper_z]
step_pin: PB6
dir_pin: PB5
enable_pin: !PC3
microsteps: 32
rotation_distance:40
#endstop_pin: tmc2209_stepper_z:virtual_endstop
#endstop_pin:PA15
endstop_pin:PA15
position_endstop: 250
position_min: -5
position_max: 255
homing_speed: 30 #60
homing_retract_dist:0 #10


[tmc2209 stepper_z]
uart_pin:PA11
driver_SGTHRS: 95
uart_address:3
interpolate: true
run_current:1.5
# hold_current:0.5
sense_resistor: 0.10
stealthchop_threshold: 0
diag_pin: ^PB14
driver_TBL: 0
driver_TOFF: 1
driver_HEND: 12
driver_HSTRT: 7

[heater_bed]
heater_pin: PB10
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
# control: watermark#pid
#control: pid
#pid_kp = 27
#pid_ki = 0.08
#pid_kd = 0
min_temp: -15
max_temp: 115

[adxl345 adx_x]
cs_pin: cp_Head:PA15
# spi_bus: spi3
spi_software_sclk_pin: cp_Head:PB3
spi_software_mosi_pin: cp_Head:PB5
spi_software_miso_pin: cp_Head:PB4
spi_speed: 5000000
axes_map: y,-z,x

[adxl345 adx_y]
cs_pin: leveling_mcu:PA4
spi_speed: 5000000
axes_map: y,x,z
spi_software_sclk_pin: leveling_mcu:PA5
spi_software_mosi_pin: leveling_mcu:PA7
spi_software_miso_pin: leveling_mcu:PA6

[resonance_tester]
accel_chip_x:adxl345 adx_x
accel_chip_y:adxl345 adx_y
min_freq: 20
max_freq: 80
probe_points:
   100,100,20

[display_status]

[printer]
kinematics:corexz
max_velocity:600
max_accel:20000
max_accel_to_decel: 10000
max_z_velocity:500
square_corner_velocity: 5.0
square_corner_max_velocity: 200.0
[pause_resume]

[soft_homing]
diff_step:20

[exclude_object]

[input_shaper]
shaper_type_x = mzv
shaper_freq_x = 49.2
shaper_type_y = mzv
shaper_freq_y = 46.2

